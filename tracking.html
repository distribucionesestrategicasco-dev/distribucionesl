<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seguimiento de Pedido — Distribuciones Estratégicas de la Costa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:#F3F6FB;min-height:100vh;padding:24px 16px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:500px;margin:0 auto}
  .card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(13,27,42,0.08);margin-bottom:14px;border:1px solid rgba(13,27,42,0.05)}
  .hdr{background:linear-gradient(160deg,#0D1B2A 0%,#0E2040 100%);padding:22px 24px;text-align:center;position:relative}
  .hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00D4B4 40%,#0B6FE8 70%,transparent)}
  .hdr img{height:68px;object-fit:contain;filter:drop-shadow(0 0 10px rgba(0,212,180,0.35))}
  .body{padding:22px}
  .search-box{display:flex;gap:8px;margin-bottom:20px}
  .search-box input{flex:1;padding:12px 16px;border:1.5px solid rgba(13,27,42,0.1);border-radius:12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#F3F6FB;transition:all 0.2s;color:#0D1B2A}
  .search-box input:focus{border-color:#0B6FE8;background:#fff;box-shadow:0 0 0 4px rgba(11,111,232,0.1)}
  .search-box button{background:#0B6FE8;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.2s;white-space:nowrap}
  .search-box button:hover{background:#0858C0;transform:translateY(-1px)}
  .order-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:10px}
  .order-id{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:900;color:#0D1B2A;letter-spacing:-0.4px}
  .order-sub{font-size:12px;color:#6B7A8D;margin-top:3px;font-weight:400}
  .badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:99px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700}
  .badge-pending{background:rgba(240,165,0,0.12);color:#C07D00}
  .badge-quoted{background:rgba(11,111,232,0.10);color:#0858C0}
  .badge-approved{background:rgba(16,185,129,0.10);color:#047857}
  .badge-dispatched{background:rgba(107,122,141,0.1);color:#354454}
  .info-box{background:#F3F6FB;border-radius:14px;padding:14px 16px;margin-bottom:16px}
  .info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13.5px;border-bottom:1px solid rgba(13,27,42,0.05)}
  .info-row:last-child{border:none}
  .info-row .lbl{color:#6B7A8D}
  .info-row .val{font-weight:600;color:#0D1B2A}
  .step{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid rgba(13,27,42,0.05)}
  .step:last-child{border:none}
  .step-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:2px solid rgba(13,27,42,0.1);background:#F3F6FB;transition:all 0.3s}
  .step-icon.done{background:rgba(16,185,129,0.1);border-color:rgba(4,120,87,0.3)}
  .step-icon.current{background:#0D1B2A;border-color:#00D4B4;box-shadow:0 0 0 4px rgba(0,212,180,0.15)}
  .step-label{font-size:14px;font-weight:500;color:#9BAABB}
  .step-label.done{color:#0D1B2A;font-weight:600}
  .step-label.current{color:#0D1B2A;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif}
  .step-current-tag{font-size:11px;color:#00B89C;margin-top:2px;font-weight:600}
  .error{text-align:center;padding:40px 0;color:#6B7A8D}
  .error .icon{font-size:48px;margin-bottom:12px;opacity:0.5}
  .loading{text-align:center;padding:40px 0;color:#6B7A8D}
  .spinner{width:32px;height:32px;border:3px solid rgba(13,27,42,0.1);border-top-color:#0B6FE8;border-radius:50%;animation:spin 0.75s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ftr{text-align:center;font-size:12px;color:#9BAABB;padding:12px;font-weight:400}
</style>
</head>

    <div class="line"></div>
    <div class="body">
      <div class="search-box">
        <input type="text" id="order-input" placeholder="Ingresa tu N° de pedido (ej: DIST-...)" autofocus>
        <button onclick="buscar()">Buscar</button>
      </div>
      <div id="result"></div>
    </div>
  </div>
  <div class="ftr">📞 (57) 321 896 5745 · distribucionesestrategicasco@gmail.com</div>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxY_h2cYlBppEseH0xaVWwdaPyOnqGIL6qM0rxepg-JtckId87FrZpHwvil4Pykl3M4/exec';

const STEPS = [
  { key: 'pending',    label: 'Pedido Recibido',   icon: '📋' },
  { key: 'quoted',     label: 'Cotización Enviada', icon: '💰' },
  { key: 'approved',   label: 'Orden Aprobada',     icon: '✅' },
  { key: 'dispatched', label: 'Pedido Despachado',  icon: '🚚' },
];

const STATUS_MAP = {
  'Pendiente':  'pending',
  'Cotizado':   'quoted',
  'Aprobado':   'approved',
  'Despachado': 'dispatched',
};

const BADGE_CLASS = {
  pending: 'badge-pending', quoted: 'badge-quoted',
  approved: 'badge-approved', dispatched: 'badge-dispatched',
};

const STATUS_LABEL = {
  pending: 'Nuevo', quoted: 'Cotizado',
  approved: 'Aprobado', dispatched: 'Despachado',
};

// Leer ID de la URL si viene como parámetro
window.addEventListener('DOMContentLoaded', function() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || params.get('order_id');
  if (id) {
    document.getElementById('order-input').value = id;
    buscar();
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') buscar();
});

function buscar() {
  const id = document.getElementById('order-input').value.trim();
  if (!id) return;
  const res = document.getElementById('result');
  res.innerHTML = '<div class="loading"><div class="spinner"></div><p>Buscando tu pedido...</p></div>';

  fetch(SHEETS_URL + '?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.status !== 'ok') throw new Error(data.msg);
      const order = data.orders.find(function(o) {
        return o.id.toUpperCase() === id.toUpperCase();
      });
      if (!order) {
        res.innerHTML = '<div class="error"><div class="icon">🔍</div><p>Pedido <strong>' + id + '</strong> no encontrado.<br><br>Verifica el número e intenta de nuevo.</p></div>';
        return;
      }
      renderOrder(order);
    })
    .catch(function(err) {
      res.innerHTML = '<div class="error"><div class="icon">⚠️</div><p>Error al conectar. Verifica tu conexión e intenta de nuevo.</p></div>';
    });
}

function renderOrder(o) {
  const status    = STATUS_MAP[o.status] || o.status;
  const stepIdx   = STEPS.findIndex(function(s) { return s.key === status; });
  const badgeClass = BADGE_CLASS[status] || '';
  const badgeLabel = STATUS_LABEL[status] || status;

  const stepsHTML = STEPS.map(function(s, i) {
    const done    = i <= stepIdx;
    const current = i === stepIdx;
    return '<div class="step">'
      + '<div class="step-icon' + (current ? ' current' : done ? ' done' : '') + '">'
      + (done && !current ? '✓' : s.icon) + '</div>'
      + '<div>'
      + '<div class="step-label' + (current ? ' current' : done ? ' done' : '') + '">' + s.label + '</div>'
      + (current ? '<div class="step-current-tag">● Estado actual</div>' : '')
      + '</div></div>';
  }).join('');

  document.getElementById('result').innerHTML =
    '<div class="order-header">'
    + '<div><div class="order-id">' + o.id + '</div>'
    + '<div class="order-sub">' + (o.cliente||'') + (o.empresa ? ' · ' + o.empresa : '') + '</div></div>'
    + '<span class="badge ' + badgeClass + '">' + badgeLabel + '</span>'
    + '</div>'
    + '<div class="info-box">'
    + '<div class="info-row"><span class="lbl">Fecha del pedido</span><span class="val">' + (o.fecha||'—').slice(0,10) + '</span></div>'
    + '<div class="info-row"><span class="lbl">Ciudad</span><span class="val">' + (o.ciudad||'—') + '</span></div>'
    + '</div>'
    + stepsHTML;
}
</script>
</body>
</html>
